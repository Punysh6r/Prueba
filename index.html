<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Focus Station</title>
    <!-- Fuentes estilo Cyberpunk / Tech -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS CSS GENERALES --- */
        body {
            background-color: #0d0e15; /* Fondo oscuro Akihabara */
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            letter-spacing: 1px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- CABECERA --- */
        .main-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #161925;
            padding-bottom: 20px;
        }

        .main-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #00f0ff, #ff007f); /* Degradado Neón */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-top: 5px;
            text-transform: uppercase;
        }
        /* --- ESTILOS DE GAMIFICACIÓN --- */
        .player-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
        }

        .stat-item {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 5px 15px;
            border-radius: 4px;
            color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .stat-item strong {
            color: #ff007f;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
        }

        /* --- SECCIÓN POMODORO --- */
        .pomodoro-section {
            background-color: #161925;
            border: 1px solid #ff007f; /* Borde rosa neón */
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.15);
            margin-bottom: 30px;
        }

        .timer-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            color: #ff007f;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
            margin-bottom: 25px;
        }

        /* --- BOTONES --- */
        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #ff007f;
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }

        .btn-primary:hover {
            background-color: #e60072;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.7);
        }

        .btn-secondary {
            background-color: transparent;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.1);
        }

        .btn-secondary:hover {
            background-color: rgba(0, 240, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.4);
        }

        /* --- DISEÑO EN CUADRÍCULA (GRID) --- */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .card {
            background-color: #161925;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 25px;
        }

        .card h3 {
            font-family: 'Orbitron', sans-serif;
            margin-top: 0;
            font-size: 1.1rem;
            color: #00f0ff;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }

        /* --- OPCIONES DE AUDIO --- */
        .audio-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .audio-btn {
            background-color: #1e293b;
            color: #e2e8f0;
            border: 1px solid transparent;
            padding: 10px;
            border-radius: 6px;
            text-align: left;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .audio-btn:hover {
            border-color: #00f0ff;
            background-color: #0f172a;
            padding-left: 15px;
        }
/* --- ESTILOS DE LA BARRA DE MISIONES --- */
        .quest-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #new-quest-input {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 10px;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        #new-quest-input:focus {
            outline: none;
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        #add-quest-btn {
            background-color: #00f0ff;
            color: #0d0e15;
            border: none;
            padding: 0 15px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        #add-quest-btn:hover {
            background-color: #00d8e6;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }
        /* --- LISTA DE MISIONES --- */
        .quest-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .quest-item {
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .quest-item.completed {
            color: #64748b;
            text-decoration: line-through;
            opacity: 0.6;
        }
    /* --- ESTILOS DEL CLICKER --- */
        .clicker-body {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .power-counter {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
            margin-bottom: 2px;
        }

        .kps-counter {
            color: #64748b;
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        #click-heavy-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff007f, #7928ca);
            color: white;
            border: none;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        #click-heavy-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(255, 0, 127, 0.2);
        }

        .upgrades-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upgrade-btn {
            background-color: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .upgrade-btn:not(:disabled):hover {
            border-color: #00f0ff;
            background-color: #0f172a;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .upgrade-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .upgrade-btn .price {
            color: #00f0ff;
            font-weight: bold;
        }

        /* Ajuste para que entren 3 columnas en pantallas grandes */
        @media (min-width: 900px) {
            .grid-layout {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- CABECERA -->
        <header class="main-header">
            <h1>STATION // FOCUS_MODE</h1>
            <p class="subtitle">Completa tus misiones diarias, no te rindas.</p>
            
            <div class="player-stats">
                <span class="stat-item">RANK: <strong id="player-level">1</strong></span>
                <span class="stat-item">XP: <strong id="player-xp">0</strong> / 300</span>
            </div>
        </header>

        <!-- POMODORO -->
        <main class="pomodoro-section">
            <div class="timer-display" id="timer">25:00</div>
            <div class="timer-controls">
                <button class="btn btn-primary" id="start-btn">INICIAR ENFOQUE</button>
                <button class="btn btn-secondary" id="pause-btn">PAUSAR</button>
            </div>
        </main>

        <!-- SECCIONES INFERIORES -->
        <section class="grid-layout">
            <div class="card clicker-card">
                <h3>ENTRENAMIENTO SHONEN</h3>
                <div class="clicker-body">
                    <div class="power-counter">Poder: <span id="power-count">0</span></div>
                    <div class="kps-counter"><span id="kps-count">0</span> Ki/seg</div>
                    
                    <button id="click-heavy-btn">⚡ ¡ENTRENAR! ⚡</button>
                    
                    <div class="upgrades-list">
                        <button class="upgrade-btn" id="buy-clone" disabled>
                            <span>👥 Clon de Sombra (+1 Ki/s)</span>
                            <span class="price" id="clone-price">50 Ki</span>
                        </button>
                        <button class="upgrade-btn" id="buy-gravity" disabled>
                            <span>🌌 Gravedad x10 (+5 Ki/s)</span>
                            <span class="price" id="gravity-price">250 Ki</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- SINTONIZADOR DE AUDIO -->
            <div class="card">
                <h3>SINTONIZADOR AMBIENTAL</h3>
                <div class="audio-options">
                    <button class="audio-btn">🌧️ Tokyo Rain</button>
                    <button class="audio-btn">🎧 Kyoto Lo-Fi</button>
                    <button class="audio-btn">🔥 Shonen Hype</button>
                </div>
            </div>

            <!-- TABLÓN DE MISIONES -->
            <div class="card">
                <h3>TABLÓN DE MISIONES</h3>
                
                <div class="quest-input-container">
                    <input type="text" id="new-quest-input" placeholder="Escribe una nueva misión..." maxlength="40">
                    <button id="add-quest-btn">＋</button>
                </div>

                <ul class="quest-list" id="quest-list">
                    <li class="quest-item"><span>⚔️ Estudiar 45 minutos sin distracciones</span></li>
                    <li class="quest-item"><span>🧪 Organizar el repositorio de GitHub</span></li>
                    <li class="quest-item completed"><span>🍱 Pausa para comer ramen</span></li>
                </ul>
            </div>

        </section>

    </div>
<!-- --- LÓGICA JAVASCRIPT --- -->
    <script>
        // --- 1. CONFIGURACIÓN DEL POMODORO ---
        let timer;
        let timeLeft = 25 * 60; 
        let isRunning = false;

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');

        function updateDisplay() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        startBtn.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                timer = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timer);
                        isRunning = false;
                        alert('¡Misión cumplida! +150 XP de bonificación por enfoque.');
                        gainXP(150); // Recompensa por terminar el pomodoro
                        timeLeft = 25 * 60; 
                        updateDisplay();
                    }
                }, 1000); 
            }
        });

        pauseBtn.addEventListener('click', () => {
            clearInterval(timer);
            isRunning = false;
        });

        // --- 2. GAMIFICACIÓN (XP Y NIVEL) ---
        let currentXP = 0;
        let currentLevel = 1;
        const xpNeeded = 300;

        const xpDisplay = document.getElementById('player-xp');
        const levelDisplay = document.getElementById('player-level');

        function gainXP(amount) {
            currentXP += amount;
            if (currentXP >= xpNeeded) {
                currentXP -= xpNeeded;
                currentLevel++;
                alert(`¡LEVEL UP! Has ascendido al Rango ${currentLevel}. Tu poder aumenta.`);
            }
            xpDisplay.textContent = currentXP;
            levelDisplay.textContent = currentLevel;
        }

        // --- 3. INTERACCIÓN Y CREACIÓN DE MISIONES ---
        const questList = document.getElementById('quest-list');
        const questInput = document.getElementById('new-quest-input');
        const addQuestBtn = document.getElementById('add-quest-btn');

        function linkQuestItem(item) {
            item.addEventListener('click', () => {
                // Si la misión no estaba completada, al hacer clic sumamos experiencia
                if (!item.classList.contains('completed')) {
                    gainXP(100); // Da 100 de XP por misión cumplida
                } else {
                    // Si la desmarcas, te resta la XP (por si te equivocas)
                    currentXP = Math.max(0, currentXP - 100);
                    xpDisplay.textContent = currentXP;
                }
                item.classList.toggle('completed');
            });
        }

        document.querySelectorAll('.quest-item').forEach(linkQuestItem);

        function addMission() {
            const text = questInput.value.trim();
            if (text !== "") {
                const li = document.createElement('li');
                li.className = 'quest-item';
                li.innerHTML = `<span>⚔️ ${text}</span>`;
                
                linkQuestItem(li);
                questList.appendChild(li);
                questInput.value = "";
            }
        }

        addQuestBtn.addEventListener('click', addMission);
        questInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addMission();
        });

        // --- 4. LOGICA DEL SINTONIZADOR DE AUDIO ---
        const audioPlayer = new Audio();
        audioPlayer.loop = true; 

        const tracks = {
            'Tokyo Rain': 'https://upload.wikimedia.org/wikipedia/commons/8/87/Rain_on_roof_looping.mp3', 
            'Kyoto Lo-Fi': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', 
            'Shonen Hype': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3'  
        };

        const audioButtons = document.querySelectorAll('.audio-btn');

        audioButtons.forEach(button => {
            button.addEventListener('click', () => {
                const trackName = button.textContent.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, '').trim();
                const trackUrl = tracks[trackName];

                if (button.classList.contains('active-audio')) {
                    audioPlayer.pause();
                    button.classList.remove('active-audio');
                    button.style.borderColor = 'transparent';
                    button.style.boxShadow = 'none';
                    return;
                }

                audioButtons.forEach(btn => {
                    btn.classList.remove('active-audio');
                    btn.style.borderColor = 'transparent';
                    btn.style.boxShadow = 'none';
                });

                audioPlayer.src = trackUrl;
                audioPlayer.play().catch(err => console.log("Interacción requerida"));

                button.classList.add('active-audio');
                button.style.borderColor = '#00f0ff';
                button.style.boxShadow = '0 0 15px rgba(0, 240, 255, 0.4)';
            });
        });
    // --- 5. SISTEMA CLICKER (ENTRENAMIENTO SHONEN) ---
        let power = 0;
        let kps = 0; // Ki Por Segundo

        // Precios iniciales y valores de las mejoras
        let clonePrice = 50;
        let gravityPrice = 250;

        const powerCountDisplay = document.getElementById('power-count');
        const kpsCountDisplay = document.getElementById('kps-count');
        const clickBtn = document.getElementById('click-heavy-btn');
        
        const buyCloneBtn = document.getElementById('buy-clone');
        const buyGravityBtn = document.getElementById('buy-gravity');
        const clonePriceDisplay = document.getElementById('clone-price');
        const gravityPriceDisplay = document.getElementById('gravity-price');

        // Función para actualizar los textos e interfaz de la tienda
        function updateClickerStore() {
            powerCountDisplay.textContent = Math.floor(power);
            kpsCountDisplay.textContent = kps;

            // Desbloquear o bloquear botones según los fondos disponibles
            buyCloneBtn.disabled = power < clonePrice;
            buyGravityBtn.disabled = power < gravityPrice;
        }

        // Hacer clic manualmente
        clickBtn.addEventListener('click', () => {
            power += 1;
            gainXP(1); // Opcional: ¡Te da 1 de XP por cada golpe/entrenamiento físico!
            updateClickerStore();
        });

        // Comprar Clon de Sombra
        buyCloneBtn.addEventListener('click', () => {
            if (power >= clonePrice) {
                power -= clonePrice;
                kps += 1;
                clonePrice = Math.floor(clonePrice * 1.15); // Sube el precio un 15%
                clonePriceDisplay.textContent = `${clonePrice} Ki`;
                updateClickerStore();
            }
        });

        // Comprar Gravedad x10
        buyGravityBtn.addEventListener('click', () => {
            if (power >= gravityPrice) {
                power -= gravityPrice;
                kps += 5;
                gravityPrice = Math.floor(gravityPrice * 1.15); // Sube el precio un 15%
                gravityPriceDisplay.textContent = `${gravityPrice} Ki`;
                updateClickerStore();
            }
        });

        // BUCLE PRINCIPAL (Game Loop): Se ejecuta cada 1 segundo para sumar el KPS automático
        setInterval(() => {
            if (kps > 0) {
                power += kps;
                updateClickerStore();
            }
        }, 1000);
    </script>
</body>
</html>
