<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Focus Station</title>
    <!-- Fuentes estilo Cyberpunk / Tech -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS CSS GENERALES --- */
        body {
            background-color: #0d0e15; /* Fondo oscuro Akihabara */
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            letter-spacing: 1px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- CABECERA --- */
        .main-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #161925;
            padding-bottom: 20px;
        }

        .main-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #00f0ff, #ff007f); /* Degradado Neón */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* --- SECCIÓN POMODORO --- */
        .pomodoro-section {
            background-color: #161925;
            border: 1px solid #ff007f; /* Borde rosa neón */
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.15);
            margin-bottom: 30px;
        }

        .timer-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            color: #ff007f;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
            margin-bottom: 25px;
        }

        /* --- BOTONES --- */
        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #ff007f;
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }

        .btn-primary:hover {
            background-color: #e60072;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.7);
        }

        .btn-secondary {
            background-color: transparent;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.1);
        }

        .btn-secondary:hover {
            background-color: rgba(0, 240, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.4);
        }

        /* --- DISEÑO EN CUADRÍCULA (GRID) --- */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .card {
            background-color: #161925;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 25px;
        }

        .card h3 {
            font-family: 'Orbitron', sans-serif;
            margin-top: 0;
            font-size: 1.1rem;
            color: #00f0ff;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }

        /* --- OPCIONES DE AUDIO --- */
        .audio-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .audio-btn {
            background-color: #1e293b;
            color: #e2e8f0;
            border: 1px solid transparent;
            padding: 10px;
            border-radius: 6px;
            text-align: left;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .audio-btn:hover {
            border-color: #00f0ff;
            background-color: #0f172a;
            padding-left: 15px;
        }

        /* --- LISTA DE MISIONES --- */
        .quest-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .quest-item {
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .quest-item.completed {
            color: #64748b;
            text-decoration: line-through;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- CABECERA -->
        <header class="main-header">
            <h1>STATION // FOCUS_MODE</h1>
            <p class="subtitle">Completa tus misiones diarias, no te rindas.</p>
        </header>

        <!-- POMODORO -->
        <main class="pomodoro-section">
            <div class="timer-display" id="timer">25:00</div>
            <div class="timer-controls">
                <button class="btn btn-primary" id="start-btn">INICIAR ENFOQUE</button>
                <button class="btn btn-secondary" id="pause-btn">PAUSAR</button>
            </div>
        </main>

        <!-- SECCIONES INFERIORES -->
        <section class="grid-layout">
            
            <!-- SINTONIZADOR DE AUDIO -->
            <div class="card">
                <h3>SINTONIZADOR AMBIENTAL</h3>
                <div class="audio-options">
                    <button class="audio-btn">🌧️ Tokyo Rain</button>
                    <button class="audio-btn">🎧 Kyoto Lo-Fi</button>
                    <button class="audio-btn">🔥 Shonen Hype</button>
                </div>
            </div>

            <!-- TABLÓN DE MISIONES -->
            <div class="card">
                <h3>TABLÓN DE MISIONES</h3>
                <ul class="quest-list">
                    <li class="quest-item"><span>⚔️ Estudiar 45 minutos sin distracciones</span></li>
                    <li class="quest-item"><span>🧪 Organizar el repositorio de GitHub</span></li>
                    <li class="quest-item completed"><span>🍱 Pausa para comer ramen</span></li>
                </ul>
            </div>

        </section>

    </div>
<!-- --- LÓGICA JAVASCRIPT --- -->
    <script>
        // --- 1. CONFIGURACIÓN DEL POMODORO ---
        let timer;
        let timeLeft = 25 * 60; // 25 minutos expresados en segundos
        let isRunning = false;

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');

        // Función para actualizar los números que se ven en pantalla
        function updateDisplay() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            // Si el número es menor de 10, le añade un 0 delante (ej: 09 en vez de 9)
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Función que arranca la cuenta atrás
        startBtn.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                timer = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        // Cuando llega a 00:00
                        clearInterval(timer);
                        isRunning = false;
                        alert('¡Misión cumplida! Tómate un breve descanso, guerrero.');
                        timeLeft = 25 * 60; // Reinicia a 25 mins
                        updateDisplay();
                    }
                }, 1000); // Se ejecuta cada 1 segundo (1000ms)
            }
        });

        // Función que pausa el tiempo
        pauseBtn.addEventListener('click', () => {
            clearInterval(timer);
            isRunning = false;
        });


        // --- 2. INTERACCIÓN DEL TABLÓN DE MISIONES ---
        const questItems = document.querySelectorAll('.quest-item');

        questItems.forEach(item => {
            // Le añadimos un "escuchador" de clics a cada misión
            item.addEventListener('click', () => {
                // Con toggle, si tiene la clase "completed" se la quita, y si no la tiene, se la pone
                item.classList.toggle('completed');
            });
        });

        // --- 3. LOGICA DEL SINTONIZADOR DE AUDIO ---
        // Creamos un único objeto de audio nativo de HTML5
        const audioPlayer = new Audio();
        audioPlayer.loop = true; // Hace que la música se repita infinitamente

        // Definimos las URLs de la música (streams de audio libre de copyright)
        const tracks = {
            'Tokyo Rain': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', // Reemplazable por sonido de lluvia
            'Kyoto Lo-Fi': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', // Música Lo-Fi chill
            'Shonen Hype': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3'  // Ritmo más enérgico
        };

        const audioButtons = document.querySelectorAll('.audio-btn');

        audioButtons.forEach(button => {
            button.addEventListener('click', () => {
                // Limpiamos el texto del botón para quedarnos solo con el nombre (ej: "Tokyo Rain")
                // Quitamos el emoji del principio con un trim
                const trackName = button.textContent.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, '').trim();
                const trackUrl = tracks[trackName];

                // Si el botón pulsado ya estaba activo, pausamos la música
                if (button.classList.contains('active-audio')) {
                    audioPlayer.pause();
                    button.classList.remove('active-audio');
                    button.style.borderColor = 'transparent';
                    button.style.boxShadow = 'none';
                    return;
                }

                // Quitamos el estilo activo a TODOS los botones antes de ponérselo al nuevo
                audioButtons.forEach(btn => {
                    btn.classList.remove('active-audio');
                    btn.style.borderColor = 'transparent';
                    btn.style.boxShadow = 'none';
                });

                // Cambiamos la fuente del audio y reproducimos
                audioPlayer.src = trackUrl;
                audioPlayer.play();

                // Iluminamos el botón actual con neón cian
                button.classList.add('active-audio');
                button.style.borderColor = '#00f0ff';
                button.style.boxShadow = '0 0 15px rgba(0, 240, 255, 0.4)';
            });
        });
    </script>
</body>
</html>
