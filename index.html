<head>

<style>
  :root {
    --bg: #0a0e14;
    --bg-soft: #0d1117;
    --primary: #00ff41;
    --primary-dim: #00b32c;
    --secondary: #00d9ff;
    --accent: #ff0080;
    --warning: #ffb000;
    --text: #c9d1d9;
    --text-dim: #6e7681;
    --border: #1f2937;
    --glow: 0 0 10px rgba(0, 255, 65, 0.5);
  }

  [data-theme="light"] {
    --bg: #f6f8fa;
    --bg-soft: #ffffff;
    --primary: #0969da;
    --primary-dim: #0550ae;
    --secondary: #8250df;
    --accent: #cf222e;
    --warning: #bf8700;
    --text: #1f2328;
    --text-dim: #656d76;
    --border: #d0d7de;
    --glow: 0 0 10px rgba(9, 105, 218, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    overflow: hidden;
    transition: background 0.6s ease, color 0.6s ease;
  }

  /* SCANLINES CRT EFFECT */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.15),
      rgba(0,0,0,0.15) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  /* TOP BAR */
  .topbar {
    height: 36px;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
    position: relative;
    z-index: 10;
  }

  .traffic-lights { display: flex; gap: 8px; }
  .light {
    width: 12px; height: 12px; border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .light:hover { transform: scale(1.2); }
  .light.red { background: #ff5f57; }
  .light.yellow { background: #febc2e; }
  .light.green { background: #28c840; }

  .topbar-title {
    flex: 1;
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.5px;
  }

  .topbar-actions { display: flex; gap: 8px; }
  .topbar-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .topbar-btn:hover {
    color: var(--primary);
    border-color: var(--primary);
    box-shadow: var(--glow);
  }

  /* STATS BAR */
  .stats-bar {
    position: fixed;
    top: 36px;
    right: 16px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text-dim);
    z-index: 100;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .stats-bar .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 8px var(--primary);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* TERMINAL */
  .terminal {
    height: calc(100vh - 36px);
    padding: 24px;
    overflow-y: auto;
    scroll-behavior: smooth;
    position: relative;
  }

  .terminal::-webkit-scrollbar { width: 8px; }
  .terminal::-webkit-scrollbar-track { background: transparent; }
  .terminal::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
  .terminal::-webkit-scrollbar-thumb:hover { background: var(--primary-dim); }

  .output {
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .line { margin-bottom: 4px; }
  .prompt { color: var(--primary); font-weight: 600; }
  .path { color: var(--secondary); }
  .cmd { color: var(--text); }
  .success { color: var(--primary); }
  .error { color: var(--accent); }
  .warning { color: var(--warning); }
  .info { color: var(--secondary); }
  .dim { color: var(--text-dim); }
  .bold { font-weight: 700; }
  .link {
    color: var(--secondary);
    text-decoration: underline;
    cursor: pointer;
    transition: all 0.2s;
  }
  .link:hover { color: var(--primary); text-shadow: var(--glow); }

  /* ASCII ART */
  .ascii {
    color: var(--primary);
    font-size: 11px;
    line-height: 1.1;
    text-shadow: var(--glow);
    margin: 8px 0;
  }

  /* INPUT LINE */
  .input-line {
    display: flex;
    align-items: center;
    font-size: 14px;
    margin-top: 4px;
  }
  .input-line .prompt { margin-right: 8px; }
  .input-line .path { margin-right: 8px; }

  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    caret-color: var(--primary);
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: var(--primary);
    animation: blink 1s infinite;
    margin-left: 2px;
    vertical-align: middle;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  /* SHARE BUTTON */
  .share-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--primary);
    color: var(--bg);
    padding: 8px 16px;
    border-radius: 4px;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .share-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0, 255, 65, 0.4);
  }

  /* MATRIX RAIN */
  #matrix-canvas {
    position: fixed;
    inset: 0;
    z-index: 9997;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #matrix-canvas.active { opacity: 1; }

  /* SNAKE GAME */
  #game-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 10000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #game-overlay.active { display: flex; }
  #game-canvas {
    border: 2px solid var(--primary);
    box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
    background: #000;
  }
  .game-info {
    color: var(--primary);
    font-size: 16px;
    text-shadow: var(--glow);
  }
  .game-close {
    background: transparent;
    border: 1px solid var(--primary);
    color: var(--primary);
    padding: 8px 20px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
  }
  .game-close:hover { background: var(--primary); color: #000; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-soft);
    border: 1px solid var(--primary);
    color: var(--primary);
    padding: 12px 24px;
    border-radius: 6px;
    font-size: 13px;
    box-shadow: var(--glow);
    z-index: 10001;
    transition: transform 0.3s ease;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* KONAMI ACHIEVEMENT */
  .achievement {
    position: fixed;
    top: 80px;
    right: 16px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #000;
    padding: 16px 20px;
    border-radius: 8px;
    font-weight: 700;
    box-shadow: 0 10px 40px rgba(0, 255, 65, 0.4);
    transform: translateX(400px);
    transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    z-index: 10002;
  }
  .achievement.show { transform: translateX(0); }
  .achievement .title { font-size: 11px; opacity: 0.8; }
  .achievement .name { font-size: 16px; margin-top: 4px; }

  /* TRANSITION OVERLAY */
  #transition {
    position: fixed;
    inset: 0;
    background: var(--primary);
    z-index: 99999;
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
    pointer-events: none;
  }
  #transition.active {
    transform: scaleY(1);
    transform-origin: top;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .terminal { padding: 12px; }
    .output, .input-line, #cmd-input { font-size: 12px; }
    .ascii { font-size: 7px; }
    .stats-bar { top: 44px; font-size: 10px; padding: 6px 8px; gap: 8px; }
    .topbar-title { display: none; }
  }
</style>
</head>

/* ============================================

const state = {
  history: [],

/* ============================================
   AUDIO - SONIDOS SATISFACTORIOS (Web Audio API)
   ============================================ */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  const now = audioCtx.currentTime;

  if (type === 'type') {
    osc.frequency.value = 800 + Math.random() * 200;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.02, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
    osc.start(now);
    osc.stop(now + 0.03);
  } else if (type === 'enter') {
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.start(now);
    osc.stop(now + 0.15);
  } else if (type === 'error') {
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
    osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.start(now);
    osc.stop(now + 0.2);
  } else if (type === 'achievement') {
    [523, 659, 784, 1047].forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = freq;
      o.type = 'sine';
      const t = now + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.15, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.start(t); o.stop(t + 0.3);
    });
  } else if (type === 'coin') {
    osc.frequency.setValueAtTime(988, now);
    osc.frequency.setValueAtTime(1319, now + 0.08);
    osc.type = 'square';
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.start(now); osc.stop(now + 0.2);
  }
}

/* ============================================
   UTILIDADES
   ============================================ */
const $ = id => document.getElementById(id);
const output = $('output');
const input = $('cmd-input');
const terminal = $('terminal');

function scrollToBottom() {
  terminal.scrollTop = terminal.scrollHeight;
}

function escapeHTML(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function appendLine(html, cls = '') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.innerHTML = html;
  output.appendChild(div);
  scrollToBottom();
}

function appendHTML(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  output.appendChild(div);
  scrollToBottom();
}

function showToast(msg) {
  const toast = $('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function unlockAchievement(name) {
  if (state.achievements.has(name)) return;
  state.achievements.add(name);
  playSound('achievement');
  const el = $('achievement');
  $('achievement-name').textContent = name;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
  $('achievement-count').textContent = `🏆 ${state.achievements.size}/5`;
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}h ${m%60}m`;
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

/* ============================================
   TIMER Y STATS
   ============================================ */
setInterval(() => {
  $('timer').textContent = formatTime(Date.now() - state.startTime);
  $('cmd-count').textContent = state.cmdCount;
}, 1000);

/* ============================================
   TEMA CLARO/OSCURO CON TRANSICIÓN ÉPICA
   ============================================ */
function toggleTheme() {
  const trans = $('transition');
  trans.classList.add('active');
  setTimeout(() => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', state.theme);
    setTimeout(() => trans.classList.remove('active'), 600);
  }, 500);
  playSound('coin');
  unlockAchievement('🎨 Camaleón digital');
}

/* ============================================
   EJECUTAR COMANDO
   ============================================ */
function runCommand(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;

  state.cmdCount++;
  state.history.push(trimmed);
  state.historyIdx = state.history.length;

  // Mostrar el comando escrito
  appendLine(`<span class="prompt">➜</span> <span class="path">~</span> <span class="cmd">${escapeHTML(trimmed)}</span>`);

  const parts = trimmed.split(' ');
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);

  // Buscar comando (incluyendo alias)
  let command = COMMANDS[cmd];
  if (!command) {
    for (const key in COMMANDS) {
      if (COMMANDS[key].aliases && COMMANDS[key].aliases.includes(cmd)) {
        command = COMMANDS[key];
        break;
      }
    }
  }

  if (command) {
    playSound('enter');
    command.run(args);

    // Logros por cantidad de comandos
    if (state.cmdCount === 10) unlockAchievement('⌨️ Explorador curioso');
    if (state.cmdCount === 50) unlockAchievement('🔥 Power user');
  } else {
    playSound('error');
    appendLine(`<span class="error">zsh: command not found: ${escapeHTML(cmd)}</span>`);
    appendLine(`<span class="dim">Escribí <span class="success">help</span> para ver los comandos disponibles.</span>`);
  }
}

window.runCommand = runCommand;

/* ============================================
   INPUT HANDLING
   ============================================ */
input.addEventListener('keydown', (e) => {
  playSound('type');

  if (e.key === 'Enter') {
    runCommand(input.value);
    input.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (state.historyIdx > 0) {
      state.historyIdx--;
      input.value = state.history[state.historyIdx] || '';
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (state.historyIdx < state.history.length - 1) {
      state.historyIdx++;
      input.value = state.history[state.historyIdx] || '';
    } else {
      state.historyIdx = state.history.length;
      input.value = '';
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value.toLowerCase();
    const allCmds = Object.keys(COMMANDS).concat(
      Object.values(COMMANDS).flatMap(c => c.aliases || [])
    );
    const match = allCmds.find(c => c.startsWith(val));
    if (match) input.value = match;
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    COMMANDS.clear.run();
  }
});

/* ============================================
   MATRIX RAIN
   ============================================ */
function startMatrix() {
  const canvas = $('matrix-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF';
  const fontSize = 14;
  const columns = canvas.width / fontSize;
  const drops = Array(Math.floor(columns)).fill(1);

  function draw() {
    if (!state.matrixActive) return;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    requestAnimationFrame(draw);
  }
  draw();
}

/* ============================================
   MINI JUEGO SNAKE
   ============================================ */
let snake, food, dir, score, gameLoop;

function openGame() {
  state.gameActive = true;
  $('game-overlay').classList.add('active');
  const canvas = $('game-canvas');
  const ctx = canvas.getContext('2d');
  const size = 20;
  const cols = canvas.width / size;

  snake = [{x: 10, y: 10}];
  dir = {x: 1, y: 0};
  score = 0;
  food = spawnFood();
  $('game-score').textContent = '0';

  function spawnFood() {
    let f;
    do {
      f = {x: Math.floor(Math.random()*cols), y: Math.floor(Math.random()*cols)};
    } while (snake.some(s => s.x === f.x && s.y === f.y));
    return f;
  }

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = 'rgba(0, 255, 65, 0.05)';
    for (let i = 0; i < cols; i++) {
      ctx.beginPath();
      ctx.moveTo(i*size, 0); ctx.lineTo(i*size, canvas.height);
      ctx.moveTo(0, i*size); ctx.lineTo(canvas.width, i*size);
      ctx.stroke();
    }

    // Food
    ctx.fillStyle = '#ff0080';
    ctx.shadowColor = '#ff0080';
    ctx.shadowBlur = 15;
    ctx.fillRect(food.x*size+2, food.y*size+2, size-4, size-4);

    // Snake
    ctx.shadowColor = '#00ff41';
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#00ff41' : '#00b32c';
      ctx.fillRect(s.x*size+1, s.y*size+1, size-2, size-2);
    });
    ctx.shadowBlur = 0;
  }

  function update() {
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // Wrap around
    if (head.x < 0) head.x = cols - 1;
    if (head.x >= cols) head.x = 0;
    if (head.y < 0) head.y = cols - 1;
    if (head.y >= cols) head.y = 0;

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      $('game-score').textContent = score;
      playSound('coin');
      food = spawnFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function gameOver() {
    clearInterval(gameLoop);
    playSound('error');
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff0080';
    ctx.font = 'bold 40px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
    ctx.fillStyle = '#00ff41';
    ctx.font = '20px monospace';
    ctx.fillText(`Score: ${score}`, canvas.width/2, canvas.height/2 + 20);
    if (score >= 100) unlockAchievement('🐍 Snake Master');
  }

  gameLoop = setInterval(update, 100);
  draw();
}

function closeGame() {
  state.gameActive = false;
  $('game-overlay').classList.remove('active');
  clearInterval(gameLoop);
  input.focus();
}
window.closeGame = closeGame;

document.addEventListener('keydown', (e) => {
  if (!state.gameActive) return;
  const k = e.key.toLowerCase();
  if ((k === 'arrowup' || k === 'w') && dir.y !== 1) dir = {x:0, y:-1};
  else if ((k === 'arrowdown' || k === 's') && dir.y !== -1) dir = {x:0, y:1};
  else if ((k === 'arrowleft' || k === 'a') && dir.x !== 1) dir = {x:-1, y:0};
  else if ((k === 'arrowright' || k === 'd') && dir.x !== -1) dir = {x:1, y:0};
  else if (k === 'escape') closeGame();
  if (['arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();
});
